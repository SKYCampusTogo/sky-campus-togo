<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>YLTP Togo – Programme jeunesse, revenus, leadership et bien-être</title>

  <meta
    name="description"
    content="YLTP Togo est un programme d’accompagnement pour aider les jeunes à générer des revenus, développer leur leadership, renforcer leur bien-être mental et agir dans leur communauté."
  />

  <style>
    :root{
      --blue:#2f80ed;
      --blue-dark:#1f5fb8;
      --blue-deep:#123f86;
      --blue-soft:#eef5ff;
      --orange:#f97316;
      --orange-dark:#ea580c;
      --cream:#fffaf4;
      --white:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --line:#dbe3ee;
      --shadow:0 22px 55px rgba(15,23,42,.10);
      --shadow-soft:0 12px 30px rgba(15,23,42,.07);
      --title-gradient:linear-gradient(90deg,#123f86 0%,#2f80ed 62%,#f97316 100%);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      line-height:1.6;
      background:
        radial-gradient(circle at top left, rgba(47,128,237,.08), transparent 26%),
        radial-gradient(circle at top right, rgba(249,115,22,.08), transparent 24%),
        linear-gradient(180deg,#fffdfa 0%,#fffaf4 100%);
    }

    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}

    .container{
      width:min(1200px, calc(100% - 40px));
      margin:0 auto;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(219,227,238,.9);
      box-shadow:0 8px 20px rgba(15,23,42,.04);
    }

    .topbar-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      padding:14px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .brand img{
      height:76px;
      width:auto;
      background:#fff;
      border-radius:16px;
      padding:6px;
      box-shadow:var(--shadow-soft);
      border:1px solid #edf2f7;
    }

    .brand .iahv-logo{height:58px}

    .brand-text strong{
      display:block;
      color:var(--blue-deep);
      font-size:20px;
      line-height:1.15;
    }

    .brand-text span{
      display:block;
      color:#64748b;
      font-size:13px;
      margin-top:4px;
      font-weight:700;
      line-height:1.35;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .nav a{
      color:#334155;
      font-size:14px;
      font-weight:800;
    }

    .nav a:hover{color:var(--blue-dark)}

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:16px 26px;
      border-radius:999px;
      font-size:16px;
      font-weight:900;
      transition:.22s ease;
      text-align:center;
      border:1px solid transparent;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--orange) 0%,var(--orange-dark) 100%);
      color:#fff;
      box-shadow:0 16px 30px rgba(249,115,22,.25);
    }

    .btn-primary:hover{
      transform:translateY(-2px);
      box-shadow:0 22px 36px rgba(249,115,22,.30);
    }

    .btn-secondary,
    .pdf-btn{
      background:#fff;
      color:var(--blue-deep);
      border-color:var(--line);
      box-shadow:var(--shadow-soft);
    }

    .btn-secondary:hover,
    .pdf-btn:hover{
      border-color:var(--blue);
      color:var(--blue-dark);
      transform:translateY(-2px);
    }

    .micro-copy{
      margin-top:14px;
      color:#475569;
      font-size:16px;
      font-weight:900;
    }

    .hero{
      overflow:hidden;
      padding:76px 0 74px;
      background:
        radial-gradient(circle at top left, rgba(47,128,237,.13), transparent 30%),
        radial-gradient(circle at top right, rgba(249,115,22,.12), transparent 24%),
        linear-gradient(180deg,#fffdfa 0%,#fff8f1 100%);
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1.02fr .98fr;
      gap:48px;
      align-items:center;
    }

    .badges,
    .hero-actions,
    .hero-tags{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .badges{margin-bottom:24px}
    .hero-actions{margin-top:32px}
    .hero-tags{margin-top:26px}

    .badge{
      background:rgba(255,255,255,.92);
      border:1px solid var(--line);
      color:var(--blue-dark);
      border-radius:999px;
      padding:12px 18px;
      font-size:15px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .hero h1{
      margin:0;
      font-size:56px;
      line-height:1.06;
      letter-spacing:-1.3px;
      color:var(--blue-deep);
      max-width:860px;
    }

    .hero h1 .accent{color:var(--orange)}

    .hero p{
      margin:24px 0 0;
      font-size:21px;
      color:#334155;
      max-width:780px;
      line-height:1.85;
    }

    .hero-visual-layout{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:18px;
      align-items:stretch;
    }

    .hero-main-photo,
    .hero-top-photo,
    .hero-info-card{
      border-radius:30px;
      overflow:hidden;
      box-shadow:var(--shadow);
      border:1px solid rgba(219,227,238,.75);
    }

    .hero-main-photo{
      min-height:540px;
      height:100%;
      background:#fff;
    }

    .hero-main-photo img,
    .hero-top-photo img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .hero-visual-right{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .hero-top-photo{
      height:225px;
      background:#fff;
    }

    .hero-info-card{
      background:linear-gradient(145deg,rgba(47,128,237,.98),rgba(18,63,134,.98));
      color:#fff;
      padding:30px;
      min-height:295px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .hero-info-card .mini{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.28em;
      color:#dbeafe;
      font-weight:900;
      margin-bottom:14px;
    }

    .hero-info-card h3{
      margin:0;
      font-size:30px;
      line-height:1.14;
      letter-spacing:-.5px;
    }

    .hero-info-card p{
      margin:16px 0 0;
      font-size:17px;
      line-height:1.85;
      color:#eff6ff;
    }

    .section{
      padding:92px 0;
      position:relative;
    }

    .section-light{background:#fff}
    .section-soft{background:#fff8f1}

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin:0 0 16px;
      color:var(--orange);
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.28em;
      font-weight:900;
    }

    .eyebrow:before{
      content:"✦";
      font-size:14px;
      letter-spacing:0;
    }

    .section h2{
      margin:0;
      font-size:48px;
      line-height:1.09;
      letter-spacing:-1.2px;
      max-width:1060px;
      color:var(--blue-deep);
    }

    .section-title-premium{
      background:var(--title-gradient);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent !important;
    }

    .lead{
      margin-top:20px;
      max-width:920px;
      color:#334155;
      font-size:21px;
      line-height:1.9;
    }

    .stats-grid,
    .cards-grid,
    .pitch-grid,
    .income-grid,
    .video-grid,
    .impact-grid,
    .steps-grid,
    .benefits-grid,
    .learn-grid,
    .audience-grid,
    .objection-grid,
    .pilot-grid{
      display:grid;
      gap:22px;
      margin-top:38px;
    }

    .stats-grid{grid-template-columns:repeat(4,1fr)}
    .cards-grid{grid-template-columns:repeat(4,1fr)}
    .pitch-grid{grid-template-columns:repeat(3,1fr)}
    .income-grid{grid-template-columns:repeat(3,1fr)}
    .video-grid{grid-template-columns:repeat(3,1fr)}
    .impact-grid{grid-template-columns:repeat(3,1fr)}
    .steps-grid{grid-template-columns:repeat(5,1fr)}
    .benefits-grid{grid-template-columns:repeat(3,1fr)}
    .learn-grid{grid-template-columns:repeat(4,1fr)}
    .audience-grid{grid-template-columns:repeat(4,1fr)}
    .objection-grid{grid-template-columns:repeat(3,1fr)}
    .pilot-grid{grid-template-columns:repeat(3,1fr)}

    .info-card,
    .pitch-card,
    .income-card,
    .video-card,
    .partner-card,
    .impact-card,
    .panel,
    .faq-item,
    .step-card,
    .benefit-card,
    .learn-card,
    .audience-card,
    .objection-card,
    .pilot-card{
      background:#fff;
      border:1px solid rgba(219,227,238,.85);
      border-radius:30px;
      box-shadow:var(--shadow);
    }

    .info-card,
    .pitch-card,
    .income-card,
    .partner-card,
    .impact-card,
    .step-card,
    .benefit-card,
    .learn-card,
    .audience-card,
    .objection-card,
    .pilot-card{
      padding:30px 26px;
      min-height:250px;
      transition:.22s ease;
      background:linear-gradient(180deg,#fff 0%,#f8fbff 100%);
    }

    .info-card:hover,
    .pitch-card:hover,
    .income-card:hover,
    .partner-card:hover,
    .impact-card:hover,
    .video-card:hover,
    .step-card:hover,
    .benefit-card:hover,
    .learn-card:hover,
    .audience-card:hover,
    .objection-card:hover,
    .pilot-card:hover{
      transform:translateY(-5px);
      box-shadow:0 26px 48px rgba(15,23,42,.13);
    }

    .icon{
      width:64px;
      height:64px;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      margin-bottom:18px;
      background:linear-gradient(135deg,var(--blue-soft) 0%,#fff 100%);
      border:1px solid #d9e7fb;
      box-shadow:var(--shadow-soft);
    }

    .info-card h3,
    .pitch-card h3,
    .income-card h3,
    .partner-card h3,
    .impact-card h3,
    .video-card h3,
    .step-card h3,
    .benefit-card h3,
    .learn-card h3,
    .audience-card h3,
    .objection-card h3,
    .pilot-card h3{
      margin:0;
      font-size:25px;
      line-height:1.2;
      color:var(--blue-deep);
      letter-spacing:-.4px;
    }

    .info-card p,
    .pitch-card p,
    .income-card p,
    .partner-card p,
    .impact-card p,
    .video-card p,
    .step-card p,
    .benefit-card p,
    .learn-card p,
    .audience-card p,
    .objection-card p,
    .pilot-card p,
    .panel p,
    .faq-item p{
      margin:14px 0 0;
      color:#334155;
      line-height:1.9;
      font-size:18px;
    }
